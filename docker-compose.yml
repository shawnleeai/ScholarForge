version: '3.8'

services:
  # ============== 基础设施服务 ==============

  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: scholarforge-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-scholarforge}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-scholarforge123}
      POSTGRES_DB: ${DB_NAME:-scholarforge}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docs/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-scholarforge}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: scholarforge-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Elasticsearch 搜索引擎
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: scholarforge-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "${ES_PORT:-9200}:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Neo4j 图数据库
  neo4j:
    image: neo4j:5.17-community
    container_name: scholarforge-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-scholarforge123}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: scholarforge-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ============== 应用服务 ==============

  # API Gateway (Kong)
  kong:
    image: kong:3.6
    container_name: scholarforge-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    ports:
      - "${KONG_PROXY_PORT:-8000}:8000"
      - "${KONG_ADMIN_PORT:-8001}:8001"
    volumes:
      - ./deploy/docker/kong.yml:/etc/kong/kong.yml:ro
    depends_on:
      - user-service
      - paper-service

  # 用户服务
  user-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.service
      args:
        SERVICE: user
    container_name: scholarforge-user-service
    environment:
      DATABASE_URL: postgresql://${DB_USER:-scholarforge}:${DB_PASSWORD:-scholarforge123}@postgres:5432/${DB_NAME:-scholarforge}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
    ports:
      - "${USER_SERVICE_PORT:-8001}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 论文服务
  paper-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.service
      args:
        SERVICE: paper
    container_name: scholarforge-paper-service
    environment:
      DATABASE_URL: postgresql://${DB_USER:-scholarforge}:${DB_PASSWORD:-scholarforge123}@postgres:5432/${DB_NAME:-scholarforge}
      REDIS_URL: redis://redis:6379/1
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD:-minioadmin123}
    ports:
      - "${PAPER_SERVICE_PORT:-8002}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # 文献服务
  article-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.service
      args:
        SERVICE: article
    container_name: scholarforge-article-service
    environment:
      DATABASE_URL: postgresql://${DB_USER:-scholarforge}:${DB_PASSWORD:-scholarforge123}@postgres:5432/${DB_NAME:-scholarforge}
      ELASTICSEARCH_URL: http://elasticsearch:9200
      CNKI_API_KEY: ${CNKI_API_KEY:-}
      WOS_API_KEY: ${WOS_API_KEY:-}
      IEEE_API_KEY: ${IEEE_API_KEY:-}
    ports:
      - "${ARTICLE_SERVICE_PORT:-8003}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  # AI 服务
  ai-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.service
      args:
        SERVICE: ai
    container_name: scholarforge-ai-service
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      REDIS_URL: redis://redis:6379/2
    ports:
      - "${AI_SERVICE_PORT:-8004}:8000"
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # 协作服务
  collab-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.service
      args:
        SERVICE: collab
    container_name: scholarforge-collab-service
    environment:
      DATABASE_URL: postgresql://${DB_USER:-scholarforge}:${DB_PASSWORD:-scholarforge123}@postgres:5432/${DB_NAME:-scholarforge}
      REDIS_URL: redis://redis:6379/3
    ports:
      - "${COLLAB_SERVICE_PORT:-8005}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 推荐服务
  recommend-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.service
      args:
        SERVICE: recommend
    container_name: scholarforge-recommend-service
    environment:
      DATABASE_URL: postgresql://${DB_USER:-scholarforge}:${DB_PASSWORD:-scholarforge123}@postgres:5432/${DB_NAME:-scholarforge}
      REDIS_URL: redis://redis:6379/4
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-scholarforge123}
    ports:
      - "${RECOMMEND_SERVICE_PORT:-8006}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  # ============== 前端服务 ==============

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scholarforge-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - kong

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  neo4j_data:
  neo4j_logs:
  minio_data:

networks:
  default:
    name: scholarforge-network
